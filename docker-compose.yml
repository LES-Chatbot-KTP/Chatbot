services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: chatbot
      POSTGRES_PASSWORD: chatbot_secret
      POSTGRES_DB: chatbot_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    depends_on:
      - db
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://chatbot:chatbot_secret@db:5432/chatbot_db
    volumes:
      - ./backend:/app

volumes:
  pgdata:
